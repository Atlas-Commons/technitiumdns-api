name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-forgejo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + mypy)
    if: contains(github.server_url, 'git.atlastechsolutions.co.uk')
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@v4
        with:
          token: ${{ secrets.FORGEJO_TOKEN }}
      - name: Setup Python
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq python3 python3-venv python3-dev build-essential
          python3 -m venv /tmp/ci-venv
          echo "/tmp/ci-venv/bin" >> "$GITHUB_PATH"
          echo "PYTHON=/tmp/ci-venv/bin/python" >> "$GITHUB_ENV"
          echo "PIP=/tmp/ci-venv/bin/pip" >> "$GITHUB_ENV"
      - name: Install dev dependencies
        run: $PIP install -e ".[dev]"
      - name: Run ruff
        run: ruff check src tests
      - name: Run ruff format check
        run: ruff format --check src tests
      - name: Run mypy
        run: mypy src

  test:
    name: Test (Python 3.12)
    if: contains(github.server_url, 'git.atlastechsolutions.co.uk')
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@v4
        with:
          token: ${{ secrets.FORGEJO_TOKEN }}
      - name: Setup Python
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq python3 python3-venv python3-dev build-essential
          python3 -m venv /tmp/ci-venv
          echo "/tmp/ci-venv/bin" >> "$GITHUB_PATH"
          echo "PYTHON=/tmp/ci-venv/bin/python" >> "$GITHUB_ENV"
          echo "PIP=/tmp/ci-venv/bin/pip" >> "$GITHUB_ENV"
      - name: Install dev dependencies
        run: $PIP install -e ".[dev]"
      - name: Run pytest with coverage
        run: pytest --cov=technitiumdns --cov-report=xml --cov-report=term

  build:
    name: Build sdist & wheel
    if: contains(github.server_url, 'git.atlastechsolutions.co.uk')
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: https://github.com/actions/checkout@v4
        with:
          token: ${{ secrets.FORGEJO_TOKEN }}
      - name: Setup Python
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq python3 python3-venv python3-dev build-essential
          python3 -m venv /tmp/ci-venv
          echo "/tmp/ci-venv/bin" >> "$GITHUB_PATH"
          echo "PYTHON=/tmp/ci-venv/bin/python" >> "$GITHUB_ENV"
          echo "PIP=/tmp/ci-venv/bin/pip" >> "$GITHUB_ENV"
      - name: Install build tools
        run: $PIP install build twine
      - name: Set CI package version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          BASE=$(grep '__version__' src/technitiumdns/_version.py | sed -E 's/.*"([^"]+)".*/\1/')
          echo "__version__ = \"${BASE}.dev${GITHUB_RUN_NUMBER}+g${GITHUB_SHA:0:7}\"" > src/technitiumdns/_version.py
      - name: Build distributions
        run: $PYTHON -m build
      - name: Validate distributions
        run: twine check dist/*
      - name: Publish to Forgejo Packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          FORGEJO_USERNAME: ${{ secrets.FORGEJO_USERNAME }}
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: bash scripts/ci/forgejo-packages.sh pypi "${{ github.repository_owner }}" technitiumdns-api

  dco:
    name: DCO sign-off
    if: contains(github.server_url, 'git.atlastechsolutions.co.uk') && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.FORGEJO_TOKEN }}
      - name: Verify DCO
        run: bash .github/scripts/verify-dco.sh

  required:
    name: Required checks
    if: always() && contains(github.server_url, 'git.atlastechsolutions.co.uk')
    runs-on: ubuntu-latest
    needs: [lint, test, build, dco]
    steps:
      - name: Verify all CI jobs succeeded
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ needs.dco.result }}" != "success" ]]; then exit 1; fi
          echo "All required CI checks passed."
