name: Live integration (manual)

# Optional live tests against a real Technitium server.
# Configure repository secrets — never commit credentials to the repo.
#
# Required secrets:
#   TECHNITIUM_TEST_URL   e.g. http://your-server:5380
#   TECHNITIUM_TEST_TOKEN API token for the test user

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live:
    name: Live server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run integration pytest suite
        env:
          TECHNITIUM_TEST_URL: ${{ secrets.TECHNITIUM_TEST_URL }}
          TECHNITIUM_TEST_TOKEN: ${{ secrets.TECHNITIUM_TEST_TOKEN }}
        run: pytest tests/test_live_integration.py -v -m integration
      - name: Run full endpoint sweep
        env:
          TECHNITIUM_TEST_URL: ${{ secrets.TECHNITIUM_TEST_URL }}
          TECHNITIUM_TEST_TOKEN: ${{ secrets.TECHNITIUM_TEST_TOKEN }}
        run: python tests/run_live_all_endpoints.py
