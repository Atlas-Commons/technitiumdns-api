name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        run: |
          set -ex
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3.12 python3.12-venv python3.12-dev python3-pip build-essential
          python3.12 -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          python -m pip install --upgrade pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run ruff
        run: ruff check src tests
      - name: Run ruff format check
        run: ruff format --check src tests
      - name: Run mypy
        run: mypy src

  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        run: |
          set -ex
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3.12 python3.12-venv python3.12-dev python3-pip build-essential
          python3.12 -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          python -m pip install --upgrade pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run pytest with coverage
        run: pytest --cov=technitiumdns --cov-report=xml --cov-report=term

  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3.12 python3.12-venv python3-pip build-essential
          python3.12 -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          python -m pip install --upgrade pip build twine
      - name: Build distributions
        run: python3 -m build
      - name: Validate distributions
        run: twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist-${{ github.run_id }}
          path: dist/

  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify DCO
        run: bash .github/scripts/verify-dco.sh

  required:
    name: Required checks
    runs-on: ubuntu-latest
    needs: [lint, test, build, dco]
    if: always()
    steps:
      - name: Verify all CI jobs succeeded
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ needs.dco.result }}" != "success" ]]; then exit 1; fi
          echo "All required CI checks passed."
