name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run ruff
        run: ruff check src tests
      - name: Run ruff format check
        run: ruff format --check src tests
      - name: Run mypy
        run: mypy src

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pytest with coverage
        run: pytest --cov=technitiumdns --cov-report=xml --cov-report=term

  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build twine
      - name: Build distributions
        run: python -m build
      - name: Validate distributions
        run: twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist-${{ github.run_id }}
          path: dist/

  # Single status check required by the main branch ruleset.
  required:
    name: Required checks
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    steps:
      - name: Verify all CI jobs succeeded
        run: |
          echo "lint:   ${{ needs.lint.result }}"
          echo "test:   ${{ needs.test.result }}"
          echo "build:  ${{ needs.build.result }}"
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "Lint job failed or was skipped."
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Test job failed or was skipped."
            exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "Build job failed or was skipped."
            exit 1
          fi
          echo "All required CI checks passed."
