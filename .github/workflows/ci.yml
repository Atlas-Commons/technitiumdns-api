name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@v4
      - uses: https://github.com/actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run ruff
        run: ruff check src tests
      - name: Run ruff format check
        run: ruff format --check src tests
      - name: Run mypy
        run: mypy src

  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@v4
      - uses: https://github.com/actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run pytest with coverage
        run: pytest --cov=technitiumdns --cov-report=xml --cov-report=term

  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: https://github.com/actions/checkout@v4
      - uses: https://github.com/actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build twine
      - name: Build distributions
        run: python3 -m build
      - name: Validate distributions
        run: twine check dist/*
      - name: Upload artifacts
        uses: https://github.com/actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist/

  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: https://github.com/actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify DCO
        run: bash .github/scripts/verify-dco.sh

  required:
    name: Required checks
    runs-on: ubuntu-latest
    needs: [lint, test, build, dco]
    if: always()
    steps:
      - name: Verify all CI jobs succeeded
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ needs.dco.result }}" != "success" ]]; then exit 1; fi
          echo "All required CI checks passed."
