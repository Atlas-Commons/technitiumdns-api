name: Live integration (GitHub)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live:
    name: Live server tests
    if: contains(github.server_url, 'github.com')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run integration pytest suite
        env:
          TECHNITIUM_TEST_URL: ${{ secrets.TECHNITIUM_TEST_URL }}
          TECHNITIUM_TEST_TOKEN: ${{ secrets.TECHNITIUM_TEST_TOKEN }}
        run: pytest tests/test_live_integration.py -v -m integration
      - name: Run full endpoint sweep
        env:
          TECHNITIUM_TEST_URL: ${{ secrets.TECHNITIUM_TEST_URL }}
          TECHNITIUM_TEST_TOKEN: ${{ secrets.TECHNITIUM_TEST_TOKEN }}
        run: python tests/run_live_all_endpoints.py
