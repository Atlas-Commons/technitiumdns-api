name: Setup Python 3.12
description: Install Python 3.12 on GitHub-hosted and Forgejo/act runners
runs:
  using: composite
  steps:
    - name: Install Python 3.12
      shell: bash
      run: |
        set -euo pipefail
        if command -v python3.12 >/dev/null 2>&1; then
          PY=python3.12
        elif command -v python3 >/dev/null 2>&1 && python3 -c 'import sys; sys.exit(0 if sys.version_info[:2] == (3, 12) else 1)'; then
          PY=python3
        else
          export DEBIAN_FRONTEND=noninteractive
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=""; fi
          $SUDO apt-get update -qq
          $SUDO apt-get install -y -qq python3.12 python3.12-venv python3-pip
          PY=python3.12
        fi
        $PY --version
        echo "$PY" > "${RUNNER_TEMP}/python3.12-bin"
        echo "PYTHON=$PY" >> "$GITHUB_ENV"
        echo "PIP=$PY -m pip" >> "$GITHUB_ENV"
