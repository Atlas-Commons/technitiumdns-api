name: Setup Python
description: Install Python on GitHub-hosted and Forgejo/act runners (node:20-bookworm)
runs:
  using: composite
  steps:
    - name: Install Python
      shell: bash
      run: |
        set -euo pipefail
        export DEBIAN_FRONTEND=noninteractive
        if ! command -v python3 >/dev/null 2>&1; then
          apt-get update -qq
          apt-get install -y -qq python3 python3-pip python3-venv python3-dev build-essential
        fi
        python3 --version
        python3 -m venv /tmp/ci-venv
        echo "/tmp/ci-venv/bin" >> "$GITHUB_PATH"
        echo "PYTHON=/tmp/ci-venv/bin/python" >> "$GITHUB_ENV"
        echo "PIP=/tmp/ci-venv/bin/pip" >> "$GITHUB_ENV"
