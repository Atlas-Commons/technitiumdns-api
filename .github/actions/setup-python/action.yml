name: Setup Python
description: Install Python on GitHub-hosted and Forgejo/act runners (node:20-bookworm)
runs:
  using: composite
  steps:
    - name: Install Python
      shell: bash
      run: |
        set -euo pipefail
        if command -v python3 >/dev/null 2>&1; then
          PY=python3
        else
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq python3 python3-pip python3-venv python3-dev build-essential
          PY=python3
        fi
        $PY --version
        echo "PYTHON=$PY" >> "$GITHUB_ENV"
        echo "PIP=$PY -m pip" >> "$GITHUB_ENV"
