name: Live integration (Forgejo)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live:
    name: Live server tests
    if: contains(github.server_url, 'git.atlastechsolutions.co.uk')
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@v4
        with:
          token: ${{ secrets.FORGEJO_TOKEN }}
      - name: Setup Python
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq python3 python3-venv python3-dev build-essential
          python3 -m venv /tmp/ci-venv
          echo "/tmp/ci-venv/bin" >> "$GITHUB_PATH"
          echo "PYTHON=/tmp/ci-venv/bin/python" >> "$GITHUB_ENV"
          echo "PIP=/tmp/ci-venv/bin/pip" >> "$GITHUB_ENV"
      - name: Install dev dependencies
        run: $PIP install -e ".[dev]"
      - name: Run integration pytest suite
        env:
          TECHNITIUM_TEST_URL: ${{ secrets.TECHNITIUM_TEST_URL }}
          TECHNITIUM_TEST_TOKEN: ${{ secrets.TECHNITIUM_TEST_TOKEN }}
        run: pytest tests/test_live_integration.py -v -m integration
      - name: Run full endpoint sweep
        env:
          TECHNITIUM_TEST_URL: ${{ secrets.TECHNITIUM_TEST_URL }}
          TECHNITIUM_TEST_TOKEN: ${{ secrets.TECHNITIUM_TEST_TOKEN }}
        run: $PYTHON tests/run_live_all_endpoints.py
